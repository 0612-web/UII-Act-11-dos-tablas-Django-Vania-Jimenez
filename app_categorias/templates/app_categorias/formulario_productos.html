{% extends 'app_categorias/base.html' %}

{% block content %}
<h2>{{ titulo }}</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    
    <div class="form-group">
        <label for="nombre">Nombre del producto:</label>
        <input type="text" id="nombre" name="nombre" 
               value="{% if producto %}{{ producto.nombre }}{% endif %}" 
               required style="width: 100%; padding: 8px; margin: 5px 0;">
    </div>
    
    <div class="form-group">
        <label for="descripcion">Descripción:</label>
        <textarea id="descripcion" name="descripcion" 
                  style="width: 100%; padding: 8px; margin: 5px 0; height: 100px;">{% if producto %}{{ producto.descripcion }}{% endif %}</textarea>
    </div>
    
    <div class="form-group">
        <label for="precio">Precio:</label>
        <input type="number" id="precio" name="precio" step="0.01" 
               value="{% if producto %}{{ producto.precio }}{% endif %}" 
               required style="width: 100%; padding: 8px; margin: 5px 0;">
    </div>
    
    <div class="form-group">
        <label for="id_categoria">Categoría:</label>
        <select id="id_categoria" name="id_categoria" style="width: 100%; padding: 8px; margin: 5px 0;">
            <option value="">Selecciona una categoría</option>
            {% for categoria in categorias %}
            <option value="{{ categoria.id_categoria }}" 
                    {% if producto and producto.id_categoria.id_categoria == categoria.id_categoria %}selected{% endif %}>
                {{ categoria.nombre }}
            </option>
            {% endfor %}
        </select>
    </div>
    
    <div class="form-group">
        <label for="id_proveedor">Proveedor:</label>
        <input type="text" id="id_proveedor" name="id_proveedor" 
               value="{% if producto %}{{ producto.id_proveedor }}{% endif %}" 
               required style="width: 100%; padding: 8px; margin: 5px 0;">
    </div>
    
    <div class="form-group">
        <label for="foto">Foto del producto:</label>
        <input type="file" id="foto" name="foto" 
               style="width: 100%; padding: 8px; margin: 5px 0;">
        {% if producto and producto.foto %}
        <div>
            <img src="{{ producto.foto.url }}" alt="{{ producto.nombre }}" style="max-width: 200px; margin-top: 10px;">
        </div>
        {% endif %}
    </div>
    
    <button type="submit" class="btn btn-success">💾 Guardar Producto</button>
    <a href="{% url 'app_categorias:listar_productos' %}" class="btn btn-primary">❌ Cancelar</a>
</form>
{% endblock %}
