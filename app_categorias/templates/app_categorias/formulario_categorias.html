{% extends 'app_categorias/base.html' %}

{% block content %}
<h2>{{ titulo }}</h2>

<form method="POST">
    {% csrf_token %}
    
    <div class="form-group">
        <label for="nombre">Nombre de la categoría:</label>
        <input type="text" id="nombre" name="nombre" 
               value="{% if categoria %}{{ categoria.nombre }}{% endif %}" 
               required style="width: 100%; padding: 8px; margin: 5px 0;">
    </div>
    
    <div class="form-group">
        <label for="descripcion">Descripción:</label>
        <textarea id="descripcion" name="descripcion" 
                  style="width: 100%; padding: 8px; margin: 5px 0; height: 100px;">{% if categoria %}{{ categoria.descripcion }}{% endif %}</textarea>
    </div>
    
    <button type="submit" class="btn btn-success">💾 Guardar Categoría</button>
    <a href="{% url 'app_categorias:listar_categorias' %}" class="btn btn-primary">❌ Cancelar</a>
</form>
{% endblock %}s
